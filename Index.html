<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klassiskt Snake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a202c;
            touch-action: none; /* Förhindrar scroll vid svep-gester på mobil */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background-color: #2d3748;
        }
        .ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.25rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #start-screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .btn {
            background-color: #48bb78;
            color: white;
            padding: 10px 25px;
            border-radius: 9999px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            background-color: #38a169;
        }
    </style>
</head>
<body>

    <div class="mb-4 text-center">
        <h1 class="text-3xl font-bold text-green-400">SNAKE</h1>
        <p class="text-gray-400 text-sm">Använd piltangenterna eller svep för att styra</p>
    </div>

    <div id="game-container">
        <canvas id="snakeGame"></canvas>
        <div class="ui-overlay">Poäng: <span id="score">0</span></div>
        
        <div id="start-screen">
            <h2 id="final-status" class="text-2xl mb-4">Redo?</h2>
            <button id="start-btn" class="btn">Starta Spelet</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const finalStatus = document.getElementById('final-status');

        // Konfiguration
        const gridSize = 20;
        let snake = [];
        let food = {};
        let dx = gridSize;
        let dy = 0;
        let score = 0;
        let gameSpeed = 100;
        let gameRunning = false;
        let nextDirection = { x: gridSize, y: 0 };

        // Anpassa canvas storlek
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, 400);
            canvas.width = Math.floor(size / gridSize) * gridSize;
            canvas.height = canvas.width;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Starta spelet
        function initGame() {
            snake = [
                { x: gridSize * 5, y: gridSize * 5 },
                { x: gridSize * 4, y: gridSize * 5 },
                { x: gridSize * 3, y: gridSize * 5 }
            ];
            dx = gridSize;
            dy = 0;
            nextDirection = { x: gridSize, y: 0 };
            score = 0;
            scoreElement.innerText = score;
            createFood();
            gameRunning = true;
            startScreen.style.display = 'none';
            main();
        }

        function main() {
            if (!gameRunning) return;

            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                
                if (didGameEnd()) {
                    gameOver();
                    return;
                }

                main();
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#2d3748";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Rita rutnät (valfritt för estetik)
            ctx.strokeStyle = "#283141";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#48bb78' : '#68d391';
                ctx.strokeStyle = '#2d3748';
                ctx.fillRect(part.x, part.y, gridSize, gridSize);
                ctx.strokeRect(part.x, part.y, gridSize, gridSize);
            });
        }

        function advanceSnake() {
            dx = nextDirection.x;
            dy = nextDirection.y;
            
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            const didEatFood = snake[0].x === food.x && snake[0].y === food.y;
            if (didEatFood) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
                // Öka svårighetsgraden lite
                if (gameSpeed > 50) gameSpeed -= 1;
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            const head = snake[0];
            // Väggkollision
            const hitWall = head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height;
            // Självkollision
            const hitSelf = snake.slice(1).some(part => part.x === head.x && part.y === head.y);
            
            return hitWall || hitSelf;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
            
            // Se till att maten inte hamnar på ormen
            if (snake.some(part => part.x === food.x && part.y === food.y)) {
                createFood();
            }
        }

        function drawFood() {
            ctx.fillStyle = "#f56565";
            ctx.beginPath();
            ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameOver() {
            gameRunning = false;
            finalStatus.innerText = `Game Over! Poäng: ${score}`;
            startScreen.style.display = 'flex';
        }

        // Kontroller
        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;
            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (keyPressed === LEFT_KEY && !goingRight) {
                nextDirection = { x: -gridSize, y: 0 };
            }
            if (keyPressed === UP_KEY && !goingDown) {
                nextDirection = { x: 0, y: -gridSize };
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                nextDirection = { x: gridSize, y: 0 };
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                nextDirection = { x: 0, y: gridSize };
            }
        }

        document.addEventListener('keydown', changeDirection);
        startBtn.addEventListener('click', initGame);

        // Mobil-touch kontroller (swipe)
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, false);

        canvas.addEventListener('touchmove', (e) => {
            if (!touchStartX || !touchStartY) return;

            let touchEndX = e.touches[0].clientX;
            let touchEndY = e.touches[0].clientY;

            let diffX = touchStartX - touchEndX;
            let diffY = touchStartY - touchEndY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Horisontell swipe
                if (diffX > 0 && dx === 0) nextDirection = { x: -gridSize, y: 0 };
                else if (diffX < 0 && dx === 0) nextDirection = { x: gridSize, y: 0 };
            } else {
                // Vertikal swipe
                if (diffY > 0 && dy === 0) nextDirection = { x: 0, y: -gridSize };
                else if (diffY < 0 && dy === 0) nextDirection = { x: 0, y: gridSize };
            }

            touchStartX = 0;
            touchStartY = 0;
            e.preventDefault();
        }, false);

    </script>
</body>
</html>
