<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lila Ormen - Snake Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1033; /* Mörklila bakgrund */
            touch-action: none; /* Förhindrar zoom/scroll vid spel */
            overflow: hidden;
        }
        canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
            border: 4px solid #4c1d95;
            max-width: 100%;
            height: auto;
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.8);
        }
        .glass-panel {
            background: rgba(46, 16, 101, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        .btn-purple {
            background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%);
            transition: all 0.2s ease;
        }
        .btn-purple:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="z-10 w-full max-w-md text-center">
        <h1 class="text-4xl font-black text-purple-300 mb-2 neon-text italic uppercase tracking-wider">Lila Ormen</h1>
        
        <!-- Score Board -->
        <div class="flex justify-between items-center glass-panel p-3 rounded-xl mb-4 text-white font-bold">
            <div class="flex flex-col items-start">
                <span class="text-xs text-purple-400 uppercase">Poäng</span>
                <span id="score" class="text-2xl">0</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-xs text-purple-400 uppercase">Rekord</span>
                <span id="highScore" class="text-2xl text-yellow-400">0</span>
            </div>
        </div>

        <!-- Game Canvas Container -->
        <div class="relative inline-block mb-6">
            <canvas id="gameCanvas" width="400" height="400" class="rounded-lg"></canvas>
            
            <!-- Overlay Screens -->
            <div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-center glass-panel rounded-lg transition-opacity duration-300">
                <div class="text-purple-200 text-xl mb-4 font-bold">Redo att slingra?</div>
                <button id="startBtn" class="btn-purple text-white px-8 py-3 rounded-full font-bold text-lg shadow-lg hover:shadow-purple-500/50">
                    STARTA SPEL
                </button>
            </div>

            <div id="gameOverScreen" class="absolute inset-0 flex flex-col items-center justify-center glass-panel rounded-lg opacity-0 pointer-events-none transition-opacity duration-300">
                <div class="text-red-400 text-3xl font-black mb-2 uppercase italic">Krasch!</div>
                <div id="finalScore" class="text-white text-lg mb-6">Poäng: 0</div>
                <button id="restartBtn" class="btn-purple text-white px-8 py-3 rounded-full font-bold text-lg shadow-lg hover:shadow-purple-500/50">
                    FÖRSÖK IGEN
                </button>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div class="grid grid-cols-3 gap-2 max-w-[200px] mx-auto sm:hidden">
            <div></div>
            <button id="upBtn" class="btn-purple p-4 rounded-xl flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>
            </button>
            <div></div>
            <button id="leftBtn" class="btn-purple p-4 rounded-xl flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <button id="downBtn" class="btn-purple p-4 rounded-xl flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <button id="rightBtn" class="btn-purple p-4 rounded-xl flex items-center justify-center">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <p class="hidden sm:block text-purple-400/50 text-sm mt-4 italic">Använd piltangenterna eller WASD för att styra</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let speed = 100;
        let isPaused = true;

        highScoreEl.innerText = highScore;

        function drawGame() {
            if (isPaused) return;

            moveSnake();
            
            if (checkGameOver()) {
                endGame();
                return;
            }

            checkFoodCollision();
            clearCanvas();
            drawFood();
            drawSnake();
            
            gameLoop = setTimeout(drawGame, speed);
        }

        function clearCanvas() {
            // Skapa en svag rutnäts-effekt i bakgrunden
            ctx.fillStyle = '#1e1b4b'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#2e1065';
            ctx.lineWidth = 1;
            for(let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? '#a78bfa' : '#6d28d9';
                ctx.shadowBlur = isHead ? 15 : 0;
                ctx.shadowColor = '#a78bfa';
                
                // Rita rundad rektangel för ormen
                const r = 5;
                const x = part.x * gridSize + 1;
                const y = part.y * gridSize + 1;
                const w = gridSize - 2;
                const h = gridSize - 2;
                
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.arcTo(x + w, y, x + w, y + h, r);
                ctx.arcTo(x + w, y + h, x, y + h, r);
                ctx.arcTo(x, y + h, x, y, r);
                ctx.arcTo(x, y, x + w, y, r);
                ctx.closePath();
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function drawFood() {
            const x = food.x * gridSize + gridSize/2;
            const y = food.y * gridSize + gridSize/2;
            
            ctx.fillStyle = '#fbbf24'; // Gyllene mat
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fbbf24';
            ctx.beginPath();
            ctx.arc(x, y, gridSize/3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);
            snake.pop();
        }

        function checkGameOver() {
            const head = snake[0];
            
            // Väggkollision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }
            
            // Självkollision
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    return true;
                }
            }
            return false;
        }

        function checkFoodCollision() {
            const head = snake[0];
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.innerText = score;
                
                // Öka farten gradvis
                if (speed > 50) speed -= 2;
                
                // Lägg till ny kroppsdel
                snake.push({});
                
                placeFood();
            }
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Se till att maten inte hamnar på ormen
            if (snake.some(part => part.x === food.x && part.y === food.y)) {
                placeFood();
            }
        }

        function startGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            speed = 100;
            scoreEl.innerText = '0';
            isPaused = false;
            startScreen.style.opacity = '0';
            startScreen.style.pointerEvents = 'none';
            gameOverScreen.style.opacity = '0';
            gameOverScreen.style.pointerEvents = 'none';
            placeFood();
            clearTimeout(gameLoop);
            drawGame();
        }

        function endGame() {
            isPaused = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.innerText = highScore;
            }
            finalScoreEl.innerText = `Slutpoäng: ${score}`;
            gameOverScreen.style.opacity = '1';
            gameOverScreen.style.pointerEvents = 'auto';
        }

        // Input hantering
        function changeDirection(newDx, newDy) {
            // Förhindra 180 graders vändningar
            if ((newDx === -dx && newDx !== 0) || (newDy === -dy && newDy !== 0)) return;
            dx = newDx;
            dy = newDy;
        }

        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W': changeDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S': changeDirection(0, 1); break;
                case 'ArrowLeft': case 'a': case 'A': changeDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': changeDirection(1, 0); break;
            }
        });

        // Touch-knappar
        document.getElementById('upBtn').onclick = () => changeDirection(0, -1);
        document.getElementById('downBtn').onclick = () => changeDirection(0, 1);
        document.getElementById('leftBtn').onclick = () => changeDirection(-1, 0);
        document.getElementById('rightBtn').onclick = () => changeDirection(1, 0);

        startBtn.onclick = startGame;
        restartBtn.onclick = startGame;

        // Initiera tom canvas
        window.onload = clearCanvas;
    </script>
</body>
</html>
